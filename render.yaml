services:
  - type: web
    name: lang-chat
    runtime: python
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: companion-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
