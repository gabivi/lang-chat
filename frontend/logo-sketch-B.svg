<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="96" fill="#1a2a40"/>
  <circle cx="100" cy="100" r="90" fill="#eef2f9"/>

  <!-- LEFT third: Human silhouette -->
  <clipPath id="leftClip">
    <rect x="10" y="10" width="56" height="180"/>
  </clipPath>
  <!-- Head -->
  <circle cx="44" cy="72" r="20" fill="#5b7fa6"/>
  <!-- Shoulders -->
  <path d="M10 150 Q44 112 78 150 L78 180 L10 180Z" fill="#5b7fa6"/>

  <!-- CENTER: Microphone -->
  <!-- Capsule -->
  <rect x="84" y="44" width="32" height="54" rx="16" fill="#1a2a40"/>
  <!-- Highlight on mic -->
  <rect x="90" y="52" width="8" height="18" rx="4" fill="#ffffff" opacity=".18"/>
  <!-- Stand arc -->
  <path d="M80 86 Q80 116 100 116 Q120 116 120 86" fill="none" stroke="#1a2a40" stroke-width="5" stroke-linecap="round"/>
  <!-- Base -->
  <line x1="100" y1="116" x2="100" y2="130" stroke="#1a2a40" stroke-width="5" stroke-linecap="round"/>
  <line x1="84" y1="130" x2="116" y2="130" stroke="#1a2a40" stroke-width="5" stroke-linecap="round"/>

  <!-- RIGHT third: AI Bot -->
  <!-- Bot head -->
  <rect x="128" y="50" width="62" height="56" rx="14" fill="#5b7fa6"/>
  <!-- Antenna -->
  <line x1="159" y1="50" x2="159" y2="38" stroke="#5b7fa6" stroke-width="3.5"/>
  <circle cx="159" cy="34" r="5" fill="#e05a5a"/>
  <!-- Eyes -->
  <circle cx="144" cy="72" r="8" fill="#eef2f9"/>
  <circle cx="172" cy="72" r="8" fill="#eef2f9"/>
  <circle cx="144" cy="72" r="4" fill="#1a2a40"/>
  <circle cx="172" cy="72" r="4" fill="#1a2a40"/>
  <!-- Mouth -->
  <rect x="140" y="90" width="38" height="10" rx="4" fill="#eef2f9" opacity=".9"/>
  <line x1="152" y1="90" x2="152" y2="100" stroke="#5b7fa6" stroke-width="1.5"/>
  <line x1="164" y1="90" x2="164" y2="100" stroke="#5b7fa6" stroke-width="1.5"/>

  <!-- Dividers -->
  <line x1="78" y1="30" x2="78" y2="170" stroke="#c5d3e8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="124" y1="30" x2="124" y2="170" stroke="#c5d3e8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- App name arc -->
  <path id="arcTop" d="M 20,100 A 80,80 0 0,1 180,100" fill="none"/>
  <text font-family="sans-serif" font-size="11" font-weight="700" fill="#5b7fa6" letter-spacing="2">
    <textPath href="#arcTop" startOffset="18%">ChitChat2Go</textPath>
  </text>
</svg>
