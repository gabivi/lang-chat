<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Companion Chat — Conversations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f7; color: #222; }

    header {
      background: #3a5fcd; color: #fff; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    #summary { font-size: .9rem; opacity: .85; }

    #controls {
      padding: .8rem 2rem; background: #fff; border-bottom: 1px solid #dde;
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
    }
    #controls input, #controls select {
      padding: .4rem .7rem; border: 1px solid #ccd; border-radius: 8px;
      font-size: .9rem;
    }
    #controls input { width: 200px; }
    #controls label { font-size: .9rem; color: #555; }

    #exportBtn {
      margin-left: auto; padding: .4rem 1rem; background: #3a5fcd;
      color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: .9rem;
    }
    #exportBtn:hover { background: #2a4fbf; }

    main { padding: 1.5rem 2rem; max-width: 960px; margin: 0 auto; }

    .conv-card {
      background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .conv-header {
      background: #eef1fb; padding: .75rem 1.2rem;
      display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; align-items: center;
    }
    .conv-header .user-name { font-weight: 700; font-size: 1.05rem; color: #3a5fcd; }
    .conv-header .meta { font-size: .82rem; color: #666; }
    .conv-header .tag {
      background: #3a5fcd22; color: #3a5fcd; border-radius: 20px;
      padding: 2px 10px; font-size: .78rem; font-weight: 600;
    }
    .conv-header .tag.he { background: #2a9d8f22; color: #2a9d8f; }

    .messages { padding: .8rem 1.2rem; display: flex; flex-direction: column; gap: .5rem; }
    .msg { display: flex; gap: .7rem; align-items: flex-start; }
    .msg.user   { flex-direction: row-reverse; }
    .msg .bubble {
      max-width: 72%; padding: .5rem .85rem; border-radius: 14px;
      font-size: .92rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
    .msg.avatar .bubble { background: #eef1fb; color: #222; border-radius: 4px 14px 14px 14px; }
    .msg.user   .bubble { background: #3a5fcd; color: #fff; border-radius: 14px 4px 14px 14px; }
    .msg .ts { font-size: .72rem; color: #999; white-space: nowrap; padding-top: 6px; }
    .msg .speaker-name { font-size: .72rem; color: #888; margin-bottom: 2px; }

    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: .95rem; }
    #loading { text-align: center; padding: 3rem; color: #888; font-size: 1rem; }
    #errorMsg { text-align: center; padding: 2rem; color: #c00; }
    </style>
  <style>
    #loginOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #loginBox {
      background: #fff; border-radius: 16px; padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.25); min-width: 320px; text-align: center;
    }
    #loginBox h2 { margin-bottom: 1.2rem; font-size: 1.2rem; color: #333; }
    #loginBox input {
      width: 100%; padding: .6rem 1rem; border: 1px solid #ccd;
      border-radius: 8px; font-size: 1rem; margin-bottom: .9rem;
    }
    #loginBox button {
      width: 100%; padding: .6rem; background: #3a5fcd; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    #loginBox button:hover { background: #2a4fbf; }
    #loginErr { color: #c00; font-size: .88rem; margin-top: .5rem; min-height: 1.2em; }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>Admin Access</h2>
    <input id="pwInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Enter</button>
    <div id="loginErr"></div>
  </div>
</div>

<header>
  <h1>Companion Chat — All Conversations</h1>
  <span id="summary"></span>
</header>

<div id="controls">
  <label>Search user: <input id="searchUser" type="text" placeholder="Name…" oninput="render()"/></label>
  <label>Language:
    <select id="filterLang" onchange="render()">
      <option value="">All</option>
      <option value="en">English</option>
      <option value="he">Hebrew</option>
    </select>
  </label>
  <label>Avatar:
    <select id="filterGender" onchange="render()">
      <option value="">All</option>
      <option value="female">Female</option>
      <option value="male">Male</option>
    </select>
  </label>
  <button id="exportBtn" onclick="exportCSV()">Export CSV</button>
</div>

<main>
  <div id="loading">Loading conversations…</div>
  <div id="errorMsg" style="display:none;"></div>
  <div id="convList"></div>
</main>

<script>
let allData = [];
let adminPassword = '';

function login() {
  const pw = document.getElementById('pwInput').value;
  if (!pw) return;
  adminPassword = pw;
  load();
}

async function load() {
  try {
    const r = await fetch('/admin/conversations', {
      headers: { 'X-Admin-Password': adminPassword }
    });
    if (r.status === 401) {
      document.getElementById('loginErr').textContent = 'Incorrect password.';
      adminPassword = '';
      return;
    }
    if (!r.ok) throw new Error(r.statusText);
    allData = await r.json();
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    render();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('errorMsg');
    el.textContent = 'Failed to load conversations: ' + e.message;
    el.style.display = 'block';
  }
}

function render() {
  const search = document.getElementById('searchUser').value.trim().toLowerCase();
  const lang   = document.getElementById('filterLang').value;
  const gender = document.getElementById('filterGender').value;

  const filtered = allData.filter(c =>
    (!search || c.user_name.toLowerCase().includes(search)) &&
    (!lang   || c.language === lang) &&
    (!gender || c.avatar_gender === gender)
  );

  document.getElementById('summary').textContent =
    `${filtered.length} conversation${filtered.length !== 1 ? 's' : ''} / ${allData.length} total`;

  const list = document.getElementById('convList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">No conversations match the filter.</div>';
    return;
  }

  list.innerHTML = filtered.map(conv => {
    const langTag   = `<span class="tag ${conv.language}">${conv.language === 'he' ? '🇮🇱 Hebrew' : '🇬🇧 English'}</span>`;
    const genderTag = `<span class="tag">${conv.avatar_gender === 'female' ? '♀' : '♂'} ${conv.avatar_name}</span>`;
    const userGTag  = conv.user_gender !== 'unknown' ? `<span class="meta">(${conv.user_gender})</span>` : '';

    const msgs = conv.messages.map(m => {
      const isUser = m.speaker === 'user';
      const name   = isUser ? conv.user_name : conv.avatar_name;
      const ts     = m.timestamp ? m.timestamp.slice(0, 16).replace('T', ' ') : '';
      return `
        <div class="msg ${m.speaker}">
          <div>
            <div class="speaker-name">${name}</div>
            <div class="bubble">${escHtml(m.text)}</div>
          </div>
          <div class="ts">${ts}</div>
        </div>`;
    }).join('');

    const noMsgs = conv.message_count === 0
      ? '<div class="empty">No messages.</div>' : '';

    return `
      <div class="conv-card">
        <div class="conv-header">
          <span class="user-name">${escHtml(conv.user_name)}</span>
          ${userGTag}
          ${langTag} ${genderTag}
          <span class="meta">Started: ${conv.created_at}</span>
          <span class="meta">Last: ${conv.updated_at}</span>
          <span class="meta">${conv.message_count} messages</span>
        </div>
        <div class="messages">${msgs}${noMsgs}</div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function exportCSV() {
  const rows = [['Conv ID','User','User Gender','Avatar','Language','Created','Updated','Speaker','Timestamp','Message']];
  allData.forEach(conv => {
    if (conv.messages.length === 0) {
      rows.push([conv.conversation_id, conv.user_name, conv.user_gender,
                 conv.avatar_name, conv.language, conv.created_at, conv.updated_at, '', '', '']);
    } else {
      conv.messages.forEach(m => {
        rows.push([conv.conversation_id, conv.user_name, conv.user_gender,
                   conv.avatar_name, conv.language, conv.created_at, conv.updated_at,
                   m.speaker, m.timestamp, m.text.replace(/\n/g,' ')]);
      });
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  a.download = 'companion_conversations.csv';
  a.click();
}

// Auto-focus password field on load
window.onload = () => document.getElementById('pwInput').focus();
</script>
</body>
</html>
