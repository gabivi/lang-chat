<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ChitChat2Go(Beta) — Conversations</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f7; color: #222; }

    header {
      background: #3a5fcd; color: #fff; padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    #summary { font-size: .9rem; opacity: .85; }

    #controls {
      padding: .8rem 2rem; background: #fff; border-bottom: 1px solid #dde;
      display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;
    }
    #controls input, #controls select {
      padding: .4rem .7rem; border: 1px solid #ccd; border-radius: 8px;
      font-size: .9rem;
    }
    #controls input { width: 200px; }
    #controls label { font-size: .9rem; color: #555; }

    #exportBtn {
      margin-left: auto; padding: .4rem 1rem; background: #3a5fcd;
      color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: .9rem;
    }
    #exportBtn:hover { background: #2a4fbf; }

    main { padding: 1.5rem 2rem; max-width: 960px; margin: 0 auto; }

    .conv-card {
      background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .conv-header {
      background: #eef1fb; padding: .75rem 1.2rem;
      display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; align-items: center;
      cursor: pointer; user-select: none;
    }
    .conv-header:hover { background: #dde4f5; }
    .collapse-arrow { margin-left: auto; font-size: .85rem; color: #888; flex-shrink: 0; }
    .messages.collapsed { display: none; }
    .conv-header .user-name { font-weight: 700; font-size: 1.05rem; color: #3a5fcd; }
    .conv-header .meta { font-size: .82rem; color: #666; }
    .conv-header .tag {
      background: #3a5fcd22; color: #3a5fcd; border-radius: 20px;
      padding: 2px 10px; font-size: .78rem; font-weight: 600;
    }
    .conv-header .tag.he { background: #2a9d8f22; color: #2a9d8f; }

    .messages { padding: .8rem 1.2rem; display: flex; flex-direction: column; gap: .5rem; }
    .msg { display: flex; gap: .7rem; align-items: flex-start; }
    .msg.user   { flex-direction: row-reverse; }
    .msg .bubble {
      max-width: 72%; padding: .5rem .85rem; border-radius: 14px;
      font-size: .92rem; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
    .msg.avatar .bubble { background: #eef1fb; color: #222; border-radius: 4px 14px 14px 14px; }
    .msg.user   .bubble { background: #3a5fcd; color: #fff; border-radius: 14px 4px 14px 14px; }
    .msg .ts { font-size: .72rem; color: #999; white-space: nowrap; padding-top: 6px; }
    .msg .speaker-name { font-size: .72rem; color: #888; margin-bottom: 2px; }

    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: .95rem; }
    #loading { text-align: center; padding: 3rem; color: #888; font-size: 1rem; }
    #errorMsg { text-align: center; padding: 2rem; color: #c00; }
    .review-section {
      margin: .5rem 1.2rem 1rem; padding: .9rem 1.1rem;
      background: #fffbe6; border-left: 4px solid #f5c518;
      border-radius: 0 10px 10px 0; font-size: .9rem;
      line-height: 1.6; white-space: pre-wrap; color: #444;
    }
    .review-section strong { display:block; margin-bottom:.4rem; color:#b8860b; font-size:.82rem; text-transform:uppercase; letter-spacing:.05em; }
    #pagination {
      display:flex; align-items:center; justify-content:center;
      gap:.8rem; margin:1.2rem 0 2rem; font-size:.9rem;
    }
    #pagination button {
      padding:.35rem .9rem; border:1px solid #ccd; border-radius:8px;
      background:#fff; cursor:pointer; font-size:.88rem;
    }
    #pagination button:disabled { opacity:.4; cursor:default; }
    #pagination button:not(:disabled):hover { background:#eef1fb; }
    #pageInfo { color:#555; font-weight:600; }
    #feedbackSection { max-width: 960px; margin: 0 auto 2rem; padding: 0 2rem; }
    #feedbackSection h2 { font-size:1rem; font-weight:700; color:#3a5fcd; margin-bottom:.7rem; }
    .fb-card {
      background:#fff; border-radius:10px; box-shadow:0 1px 5px rgba(0,0,0,.08);
      padding:.65rem 1rem; margin-bottom:.5rem;
      display:flex; gap:1rem; align-items:flex-start;
    }
    .fb-user  { font-weight:600; color:#3a5fcd; font-size:.88rem; white-space:nowrap; min-width:90px; }
    .fb-text  { flex:1; font-size:.92rem; color:#333; line-height:1.45; word-break:break-word; }
    .fb-ts    { font-size:.75rem; color:#aaa; white-space:nowrap; }
    </style>
  <style>
    #loginOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #loginBox {
      background: #fff; border-radius: 16px; padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.25); min-width: 320px; text-align: center;
    }
    #loginBox h2 { margin-bottom: 1.2rem; font-size: 1.2rem; color: #333; }
    #loginBox input {
      width: 100%; padding: .6rem 1rem; border: 1px solid #ccd;
      border-radius: 8px; font-size: 1rem; margin-bottom: .9rem;
    }
    #loginBox button {
      width: 100%; padding: .6rem; background: #3a5fcd; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    #loginBox button:hover { background: #2a4fbf; }
    #loginErr { color: #c00; font-size: .88rem; margin-top: .5rem; min-height: 1.2em; }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h2>Admin Access</h2>
    <input id="pwInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Enter</button>
    <div id="loginErr"></div>
  </div>
</div>

<header>
  <img src="/static/logo-sketch-C1.jpg" alt="logo" style="width:44px;height:44px;object-fit:cover;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3);flex-shrink:0;"/>
  <h1>ChitChat2Go(Beta) — All Conversations</h1>
  <span id="summary"></span>
</header>

<div id="controls">
  <label>Search user: <input id="searchUser" type="text" placeholder="Name…" oninput="render()"/></label>
  <label>Language:
    <select id="filterLang" onchange="render()">
      <option value="">All</option>
      <option value="en">English</option>
      <option value="he">Hebrew</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="hu">Hungarian</option>
      <option value="ar">Arabic</option>
    </select>
  </label>
  <label>Avatar:
    <select id="filterGender" onchange="render()">
      <option value="">All</option>
      <option value="female">Female</option>
      <option value="male">Male</option>
    </select>
  </label>
  <label>Sort by:
    <select id="sortBy" onchange="render()">
      <option value="date_desc">Date (newest)</option>
      <option value="date_asc">Date (oldest)</option>
      <option value="name_asc">User name A–Z</option>
      <option value="name_desc">User name Z–A</option>
      <option value="msgs_desc">Most messages</option>
      <option value="msgs_asc">Fewest messages</option>
      <option value="lang_asc">Language</option>
      <option value="gender_asc">Avatar gender</option>
    </select>
  </label>
  <button id="exportBtn" onclick="exportCSV()">Export CSV</button>
</div>

<div id="feedbackSection" style="display:none;">
  <h2>💬 User Feedback</h2>
  <div id="feedbackList"></div>
</div>

<main>
  <div id="loading">Loading conversations…</div>
  <div id="errorMsg" style="display:none;"></div>
  <div id="convList"></div>
  <div id="pagination" style="display:none;">
    <button id="prevBtn" onclick="changePage(-1)">← Prev</button>
    <span id="pageInfo"></span>
    <button id="nextBtn" onclick="changePage(1)">Next →</button>
  </div>
</main>

<script>
let allData = [];
let filteredData = [];
let currentPage = 1;
const PAGE_SIZE = 30;
let adminPassword = sessionStorage.getItem('adminPw') || '';

function fmtDate(s) {
  if (!s) return '';
  const [date, time] = s.split(' ');
  const [y, m, d] = date.split('-');
  return `${d}-${m}-${y}${time ? ' ' + time : ''}`;
}

function convLength(created, updated) {
  if (!created || !updated) return '';
  const parse = s => { const [date, time] = s.split(' '); return new Date(`${date}T${time||'00:00'}:00`); };
  const diff = Math.round((parse(updated) - parse(created)) / 60000);
  if (diff < 1) return '<1m';
  if (diff < 60) return diff + 'm';
  return Math.floor(diff/60) + 'h ' + (diff%60) + 'm';
}

function login() {
  const pw = document.getElementById('pwInput').value;
  if (!pw) return;
  adminPassword = pw;
  load();
}

async function load() {
  try {
    const headers = { 'X-Admin-Password': adminPassword };
    const [convR, fbR] = await Promise.all([
      fetch('/admin/conversations', { headers }),
      fetch('/admin/feedback',      { headers }),
    ]);
    if (convR.status === 401) {
      document.getElementById('loginErr').textContent = 'Incorrect password.';
      adminPassword = '';
      sessionStorage.removeItem('adminPw');
      return;
    }
    if (!convR.ok) throw new Error(convR.statusText);
    allData = await convR.json();
    const fbData = fbR.ok ? await fbR.json() : [];
    sessionStorage.setItem('adminPw', adminPassword);
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    render();
    renderFeedback(fbData);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('errorMsg');
    el.textContent = 'Failed to load: ' + e.message;
    el.style.display = 'block';
  }
}

function renderFeedback(items) {
  const section = document.getElementById('feedbackSection');
  const list    = document.getElementById('feedbackList');
  if (!items || items.length === 0) return;
  section.style.display = 'block';
  list.innerHTML = items.map(fb => `
    <div class="fb-card">
      <span class="fb-user">${escHtml(fb.user_name)}</span>
      <span class="fb-text">${escHtml(fb.text)}</span>
      <span class="fb-ts">${fb.created_at}</span>
    </div>`).join('');
}

function sortData(arr) {
  const s = document.getElementById('sortBy').value;
  const copy = [...arr];
  copy.sort((a, b) => {
    switch (s) {
      case 'date_desc':  return b.created_at.localeCompare(a.created_at);
      case 'date_asc':   return a.created_at.localeCompare(b.created_at);
      case 'name_asc':   return a.user_name.localeCompare(b.user_name);
      case 'name_desc':  return b.user_name.localeCompare(a.user_name);
      case 'msgs_desc':  return b.message_count - a.message_count;
      case 'msgs_asc':   return a.message_count - b.message_count;
      case 'lang_asc':   return a.language.localeCompare(b.language);
      case 'gender_asc': return a.avatar_gender.localeCompare(b.avatar_gender);
      default:           return 0;
    }
  });
  return copy;
}

function toggleMessages(cardId) {
  const el = document.getElementById('msgs-' + cardId);
  const arrow = document.getElementById('arrow-' + cardId);
  if (!el) return;
  const collapsed = el.classList.toggle('collapsed');
  arrow.textContent = collapsed ? '▶ Show' : '▼ Hide';
}

function render() {
  const search = document.getElementById('searchUser').value.trim().toLowerCase();
  const lang   = document.getElementById('filterLang').value;
  const gender = document.getElementById('filterGender').value;

  filteredData = sortData(allData.filter(c =>
    (!search || c.user_name.toLowerCase().includes(search)) &&
    (!lang   || c.language === lang) &&
    (!gender || c.avatar_gender === gender)
  ));
  currentPage = 1;
  renderPage();
}

function changePage(dir) {
  const pages = Math.ceil(filteredData.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(pages, currentPage + dir));
  renderPage();
}

function renderPage() {
  const total  = filteredData.length;
  const pages  = Math.ceil(total / PAGE_SIZE) || 1;
  const start  = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredData.slice(start, start + PAGE_SIZE);

  document.getElementById('summary').textContent =
    `${total} conversation${total !== 1 ? 's' : ''} / ${allData.length} total`;

  const pag = document.getElementById('pagination');
  pag.style.display = pages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${pages}`;
  document.getElementById('prevBtn').disabled = currentPage <= 1;
  document.getElementById('nextBtn').disabled = currentPage >= pages;

  const list = document.getElementById('convList');
  if (total === 0) {
    list.innerHTML = '<div class="empty">No conversations match the filter.</div>';
    return;
  }

  const LANG_LABELS = {he:'🇮🇱 Hebrew', en:'🇬🇧 English', de:'🇩🇪 German', es:'🇪🇸 Spanish', fr:'🇫🇷 French', hu:'🇭🇺 Hungarian', ar:'🗣️ Arabic'};

  list.innerHTML = pageData.map(conv => {
    const cid       = conv.conversation_id;
    const langTag   = `<span class="tag ${conv.language}">${LANG_LABELS[conv.language] || conv.language}</span>`;
    const genderTag = `<span class="tag">${conv.avatar_gender === 'female' ? '♀' : '♂'} ${conv.avatar_name}</span>`;
    const userGTag  = conv.user_gender !== 'unknown' ? `<span class="meta">(${conv.user_gender})</span>` : '';
    const length    = convLength(conv.created_at, conv.updated_at);

    const msgs = conv.messages.map(m => {
      const isUser = m.speaker === 'user';
      const name   = isUser ? conv.user_name : conv.avatar_name;
      const ts     = m.timestamp ? fmtDate(m.timestamp.slice(0,16).replace('T',' ')) : '';
      return `
        <div class="msg ${m.speaker}">
          <div>
            <div class="speaker-name">${name}</div>
            <div class="bubble">${escHtml(m.text)}</div>
          </div>
          <div class="ts">${ts}</div>
        </div>`;
    }).join('');

    const noMsgs   = conv.message_count === 0 ? '<div class="empty">No messages.</div>' : '';
    const reviewHtml = conv.review
      ? `<div class="review-section"><strong>Conversation Review</strong>${escHtml(conv.review)}</div>` : '';

    return `
      <div class="conv-card">
        <div class="conv-header" onclick="toggleMessages(${cid})">
          <span class="user-name">${escHtml(conv.user_name)}</span>
          ${userGTag}
          ${langTag} ${genderTag}
          <span class="meta">📅 ${fmtDate(conv.created_at)}</span>
          <span class="meta">🕓 ${fmtDate(conv.updated_at)}</span>
          <span class="meta">${conv.message_count} msg${conv.message_count !== 1 ? 's' : ''}</span>
          ${length ? `<span class="meta">⏱ ${length}</span>` : ''}
          ${conv.review ? '<span class="tag" style="background:#f5c51822;color:#b8860b;">✓ Review</span>' : ''}
          <span class="collapse-arrow" id="arrow-${cid}">▶ Show</span>
        </div>
        <div class="messages collapsed" id="msgs-${cid}">${msgs}${noMsgs}${reviewHtml}</div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function exportCSV() {
  const rows = [['Conv ID','User','User Gender','Avatar','Language','Created','Updated','Speaker','Timestamp','Message']];
  allData.forEach(conv => {
    if (conv.messages.length === 0) {
      rows.push([conv.conversation_id, conv.user_name, conv.user_gender,
                 conv.avatar_name, conv.language, conv.created_at, conv.updated_at, '', '', '']);
    } else {
      conv.messages.forEach(m => {
        rows.push([conv.conversation_id, conv.user_name, conv.user_gender,
                   conv.avatar_name, conv.language, conv.created_at, conv.updated_at,
                   m.speaker, m.timestamp, m.text.replace(/\n/g,' ')]);
      });
    }
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);
  a.download = 'companion_conversations.csv';
  a.click();
}

window.onload = () => {
  if (adminPassword) {
    load();
  } else {
    document.getElementById('pwInput').focus();
  }
};
</script>
</body>
</html>
