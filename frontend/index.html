<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companion Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --accent: #5b7fa6;
      --accent-light: #e8f0fa;
      --avatar-bg: #f0f4fb;
    }

    body {
      background: #f7f9fc;
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.15rem;
    }

    /* ── screens ─────────────────────────────────────────────── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── card wrapper ─────────────────────────────────────────── */
    .card-main {
      max-width: 540px;
      margin: 40px auto;
      border-radius: 20px;
      box-shadow: 0 6px 32px rgba(0,0,0,.10);
      background: #fff;
      padding: 2.2rem 2rem;
    }

    /* ── big buttons ─────────────────────────────────────────── */
    .btn-big {
      font-size: 1.25rem;
      padding: .75rem 1.5rem;
      border-radius: 14px;
      width: 100%;
      margin-bottom: .75rem;
    }
    .btn-primary   { background: var(--accent); border-color: var(--accent); }
    .btn-primary:hover { background: #4a6d94; border-color: #4a6d94; }

    /* ── name input ─────────────────────────────────────────── */
    #nameInput {
      font-size: 1.3rem;
      padding: .65rem 1rem;
      border-radius: 12px;
      text-align: center;
    }

    /* ── conversation list ─────────────────────────────────── */
    .conv-item {
      cursor: pointer;
      border-radius: 12px;
      padding: .8rem 1rem;
      margin-bottom: .5rem;
      background: var(--accent-light);
      transition: background .15s;
    }
    .conv-item:hover { background: #d1dff5; }
    .conv-title { font-weight: 600; font-size: 1.05rem; }
    .conv-meta  { font-size: .85rem; color: #666; }

    /* ── setup screen ────────────────────────────────────────── */
    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      margin-bottom: 1.2rem;
    }
    .choice-btn {
      border: 2px solid #ccc;
      border-radius: 14px;
      padding: 1rem;
      background: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .choice-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── chat screen ─────────────────────────────────────────── */
    #avatarIcon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--avatar-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }
    #avatarName {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    #transcript {
      height: 320px;
      overflow-y: auto;
      border: 1px solid #dde3ee;
      border-radius: 14px;
      padding: 1rem;
      background: #fafbfe;
      margin-bottom: 1rem;
    }

    .bubble {
      max-width: 85%;
      padding: .55rem .9rem;
      border-radius: 14px;
      margin-bottom: .6rem;
      line-height: 1.45;
      font-size: 1.05rem;
    }
    .bubble-avatar {
      background: var(--accent-light);
      color: #1a2a40;
      margin-right: auto;
    }
    .bubble-user {
      background: var(--accent);
      color: #fff;
      margin-left: auto;
      text-align: right;
    }
    /* RTL bubbles */
    [dir="rtl"] .bubble-avatar { margin-left: auto; margin-right: 0; text-align: right; }
    [dir="rtl"] .bubble-user   { margin-right: auto; margin-left: 0; text-align: left; }

    #micBtn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 2rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto .75rem;
      box-shadow: 0 4px 14px rgba(0,0,0,.2);
      transition: background .15s, transform .1s;
      cursor: pointer;
    }
    #micBtn:hover { background: #4a6d94; }
    #micBtn.listening {
      background: #e05a5a;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(224,90,90,.5); }
      50%      { box-shadow: 0 0 0 12px rgba(224,90,90,0); }
    }

    #micLabel {
      text-align: center;
      color: #888;
      font-size: .95rem;
      margin-bottom: .5rem;
      min-height: 1.4em;
    }

    #statusBar {
      text-align: center;
      font-size: .9rem;
      color: #aaa;
      min-height: 1.2em;
    }

    .action-btns {
      display: flex;
      gap: .6rem;
      margin-top: .6rem;
    }
    .action-btns .btn {
      flex: 1;
      font-size: 1rem;
      border-radius: 12px;
      padding: .55rem;
    }

    /* ── title ──────────────────────────────────────────────── */
    .app-title {
      text-align: center;
      color: var(--accent);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .app-subtitle {
      text-align: center;
      color: #888;
      font-size: 1rem;
      margin-top: -.8rem;
      margin-bottom: 1.6rem;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     SCREEN 1 — Welcome / Name entry
═══════════════════════════════════════════════════ -->
<div id="screenWelcome" class="screen active">
  <div class="card-main">
    <div class="app-title">&#128515; Companion Chat</div>
    <div class="app-subtitle">A friendly conversation, just for you</div>

    <label class="form-label fw-semibold" for="nameInput" style="font-size:1.1rem;">
      What is your name?
    </label>
    <input id="nameInput" type="text" class="form-control mb-3"
           placeholder="Type your name here…"
           autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="btn btn-primary btn-big" onclick="doIdentify()">Continue &#8594;</button>
    <div id="welcomeError" class="text-danger text-center mt-2" style="display:none;"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN 2 — Returning user: resume or new
═══════════════════════════════════════════════════ -->
<div id="screenResume" class="screen">
  <div class="card-main">
    <div class="app-title">Welcome back, <span id="resumeName"></span>!</div>

    <p class="text-center text-muted mb-3">Would you like to continue a previous conversation?</p>
    <div id="convList" class="mb-3"></div>

    <hr />
    <button class="btn btn-primary btn-big" onclick="goSetup()">
      &#43; Start a new conversation
    </button>
    <button class="btn btn-outline-secondary btn-big" onclick="goWelcome()">
      &#8592; Not me
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN 3 — Setup: language + avatar
═══════════════════════════════════════════════════ -->
<div id="screenSetup" class="screen">
  <div class="card-main">
    <div class="app-title">Let's set up your chat</div>

    <p class="fw-semibold mb-2" style="font-size:1.1rem;">Choose language:</p>
    <div class="choice-grid mb-3">
      <div class="choice-btn selected" data-group="lang" data-value="en" onclick="pick(this)">
        &#127468;&#127463; English
      </div>
      <div class="choice-btn" data-group="lang" data-value="he" onclick="pick(this)">
        &#127470;&#127473; &#1506;&#1489;&#1512;&#1497;&#1514;
      </div>
    </div>

    <p class="fw-semibold mb-2" style="font-size:1.1rem;">Choose companion:</p>
    <div class="choice-grid mb-3">
      <div class="choice-btn selected" data-group="gender" data-value="female" onclick="pick(this)">
        &#128105; Female
      </div>
      <div class="choice-btn" data-group="gender" data-value="male" onclick="pick(this)">
        &#128104; Male
      </div>
    </div>

    <p class="fw-semibold mb-1" style="font-size:1.1rem;">Speaking voice:</p>
    <select id="voiceSelect" class="form-select mb-4" style="font-size:1rem; border-radius:12px;">
      <option value="">Loading voices…</option>
    </select>

    <button class="btn btn-primary btn-big" onclick="startConversation()">
      &#128172; Start Chatting
    </button>
    <button class="btn btn-outline-secondary btn-big" onclick="goWelcome()">
      &#8592; Back
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     SCREEN 4 — Chat
═══════════════════════════════════════════════════ -->
<div id="screenChat" class="screen">
  <div class="card-main">
    <div id="avatarIcon">&#128512;</div>
    <div id="avatarName">…</div>

    <div id="transcript"></div>

    <div id="micLabel">Tap the microphone to speak</div>
    <button id="micBtn" onclick="toggleMic()">&#127908;</button>
    <button id="stopBtn" onclick="stopSpeaking()" title="Stop speaking"
            style="display:none; margin:.3rem auto .1rem; background:#e05a5a; color:#fff;
                   border:none; border-radius:10px; padding:.35rem 1.2rem; font-size:.95rem; cursor:pointer;">
      &#9646;&#9646; Stop
    </button>
    <div id="statusBar">&nbsp;</div>

    <div class="action-btns">
      <button class="btn btn-outline-primary" onclick="suggestTopics()">
        &#128172; Skip &amp; suggest topics
      </button>
      <button class="btn btn-outline-danger" onclick="endConversation()">
        &#9723; End chat
      </button>
    </div>
  </div>
</div>


<script>
// ════════════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════════════
let userId          = null;
let userName        = '';
let conversationId  = null;
let language        = 'en';
let avatarGender    = 'female';
let recognition     = null;
let ttsVoice        = null;
let listening       = false;
let ttsQueue        = [];
let ttsBusy         = false;
let finalTranscript = '';   // captures speech during recognition
let voicesReady     = false;

// ════════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function pick(el) {
  const group = el.dataset.group;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  if (group === 'lang')   language     = el.dataset.value;
  if (group === 'gender') avatarGender = el.dataset.value;
  if (voicesReady) populateVoiceDropdown();   // refresh voice list / auto-selection
}

function setDir(lang) {
  document.documentElement.lang = lang;
  document.getElementById('transcript').dir = lang === 'he' ? 'rtl' : 'ltr';
}

function avatarEmoji(gender) {
  return gender === 'male' ? '&#128104;' : '&#128105;';
}

function scrollTranscript() {
  const t = document.getElementById('transcript');
  t.scrollTop = t.scrollHeight;
}

function addBubble(speaker, text) {
  const t = document.getElementById('transcript');
  const div = document.createElement('div');
  div.className = `bubble bubble-${speaker}`;
  div.textContent = text;
  t.appendChild(div);
  scrollTranscript();
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

function goWelcome() {
  document.getElementById('nameInput').value = '';
  show('screenWelcome');
}

function goSetup() {
  show('screenSetup');
}

// ════════════════════════════════════════════════════════
//  Screen 1 — Identify
// ════════════════════════════════════════════════════════
async function doIdentify() {
  const name = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('welcomeError');
  errEl.style.display = 'none';

  if (!name) {
    errEl.textContent = 'Please enter your name.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res  = await fetch('/users/identify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await res.json();
    userId   = data.id;
    userName = data.name;

    if (!data.is_new && data.conversations.length > 0) {
      // Returning user with past conversations
      document.getElementById('resumeName').textContent = data.name;
      renderConvList(data.conversations);
      show('screenResume');
    } else {
      goSetup();
    }
  } catch (e) {
    errEl.textContent = 'Could not connect to server. Please try again.';
    errEl.style.display = 'block';
  }
}

// ════════════════════════════════════════════════════════
//  Screen 2 — Resume conversation list
// ════════════════════════════════════════════════════════
function renderConvList(convs) {
  const el = document.getElementById('convList');
  el.innerHTML = '';
  convs.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conv-item';
    div.innerHTML = `
      <div class="conv-title">${c.title}</div>
      <div class="conv-meta">${c.avatar_name} &bull; ${langLabel(c.language)} &bull; ${c.message_count} messages &bull; ${c.updated_at}</div>
    `;
    div.onclick = () => resumeConversation(c.id, c.avatar_name, c.avatar_gender, c.language);
    el.appendChild(div);
  });
}

function langLabel(l) { return l === 'he' ? 'Hebrew' : 'English'; }

async function resumeConversation(convId, avatarName, gender, lang) {
  conversationId = convId;
  language       = lang;
  avatarGender   = gender;
  setDir(lang);
  document.getElementById('avatarIcon').innerHTML = avatarEmoji(gender);
  document.getElementById('avatarName').textContent = avatarName;

  // Load history
  try {
    const res  = await fetch(`/conversations/${convId}`);
    const data = await res.json();
    document.getElementById('transcript').innerHTML = '';
    data.messages.forEach(m => addBubble(m.speaker === 'user' ? 'user' : 'avatar', m.text));
  } catch (e) { /* show empty transcript */ }

  initTTS(lang, gender);
  show('screenChat');
  setStatus('Starting…');

  // Send resume command so the avatar greets them as a returning person
  try {
    const res  = await fetch(`/conversations/${convId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: '__RESUME__' }),
    });
    const data = await res.json();
    if (res.ok) {
      addBubble('avatar', data.text);
      speak(data.text);
    }
  } catch (e) { /* silent */ }

  setStatus('Tap the microphone to speak.');
}

// ════════════════════════════════════════════════════════
//  Screen 3 → Screen 4 — Start new conversation
// ════════════════════════════════════════════════════════
async function startConversation() {
  setDir(language);
  document.getElementById('avatarIcon').innerHTML = avatarEmoji(avatarGender);
  document.getElementById('avatarName').textContent = '…';
  document.getElementById('transcript').innerHTML = '';
  show('screenChat');
  setStatus('Starting…');

  try {
    const res  = await fetch('/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, language, avatar_gender: avatarGender }),
    });
    const data = await res.json();

    if (!res.ok) {
      setStatus(data.detail || 'Error starting conversation.');
      return;
    }

    conversationId = data.conversation_id;
    document.getElementById('avatarName').textContent = data.avatar_name;

    initTTS(language, avatarGender);
    addBubble('avatar', data.greeting);
    speak(data.greeting);
    setStatus('Tap the microphone to speak.');
  } catch (e) {
    setStatus('Could not connect to server.');
  }
}

// ════════════════════════════════════════════════════════
//  TTS — Web Speech Synthesis
// ════════════════════════════════════════════════════════

// Regex patterns that identify voice gender from the voice name.
// \bmale\b uses word-boundary so it NEVER matches inside "female".
// Hebrew voices: Microsoft Asaf (male), Microsoft Haila / Tamar / Yonit (female)
// \bmale\b word-boundary never matches inside "female"
const FEMALE_RE = /female|\b(samantha|karen|moira|tessa|fiona|victoria|zira|hazel|eva|susan|helena|anna|carmit|amelie|alice|kate|serena|veena|aria|jenny|clara|ava|emma|ivy|joanna|kendra|kimberly|salli|nicole|lotte|marlene|carla|bianca|celine|lea|penelope|lucia|naja|mia|liv|astrid|haila|tamar|yonit)\b/i;
const MALE_RE   = /\bmale\b|\b(david|alex|fred|lee|tom|jorge|luca|daniel|mark|james|aaron|arthur|rishi|oliver|guy|reed|roger|eric|brian|matthew|joey|andrew|hans|mathieu|giorgio|filiz|takumi|enrique|miguel|ricardo|geraint|russel|justin|kevin|stephen|asaf)\b/i;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) {
    voicesReady = true;
    populateVoiceDropdown();
  }
}

// Fill the voice <select> and auto-highlight best match for current gender
function populateVoiceDropdown() {
  const voices = window.speechSynthesis.getVoices();
  const code   = language === 'he' ? 'he' : 'en';
  const pool   = voices.filter(v => v.lang.startsWith(code));
  if (!pool.length) return;

  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  const wantRe   = avatarGender === 'female' ? FEMALE_RE : MALE_RE;
  const rejectRe = avatarGender === 'female' ? MALE_RE   : FEMALE_RE;

  let bestIdx = 0;
  pool.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    const tag = FEMALE_RE.test(v.name) ? ' ♀' : MALE_RE.test(v.name) ? ' ♂' : '';
    opt.textContent = v.name + tag;
    sel.appendChild(opt);
    if (wantRe.test(v.name)) { if (bestIdx === 0 || !wantRe.test(pool[bestIdx].name)) bestIdx = i; }
  });

  // If no positive match, prefer one that doesn't match opposite gender
  if (!wantRe.test(pool[bestIdx].name)) {
    const neutral = pool.findIndex(v => !rejectRe.test(v.name));
    if (neutral >= 0) bestIdx = neutral;
  }

  sel.value = bestIdx;
  ttsVoice  = pool[bestIdx];
}

// Read the selected voice from the dropdown
function applyVoiceSelection() {
  const voices = window.speechSynthesis.getVoices();
  const code   = language === 'he' ? 'he' : 'en';
  const pool   = voices.filter(v => v.lang.startsWith(code));
  const idx    = parseInt(document.getElementById('voiceSelect').value, 10);
  ttsVoice     = pool[idx] || pool[0] || voices[0] || null;
  console.log('[TTS] voice applied:', ttsVoice ? ttsVoice.name : 'none');
}

function initTTS(lang, gender) {
  language     = lang;
  avatarGender = gender;
  ttsVoice     = null;
  if (voicesReady) {
    applyVoiceSelection();   // use whatever is in the dropdown
  }
}

// Remove emoji and symbols before speaking — TTS reads them as "grinning face" etc.
function stripForTTS(text) {
  return text
    .replace(/\p{Emoji_Presentation}/gu, '')   // emoji glyphs
    .replace(/[\u{FE00}-\u{FE0F}]/gu, '')      // variation selectors
    .replace(/\u{200D}/gu, '')                  // zero-width joiner
    .replace(/\s+/g, ' ')
    .trim();
}

function speak(text) {
  if (!text) return;
  text = stripForTTS(text);
  if (!text) return;

  const doSpeak = () => {
    if (!ttsVoice) applyVoiceSelection();
    ttsQueue.push(text);
    if (!ttsBusy) drainTTS();
  };

  if (voicesReady) {
    doSpeak();
  } else {
    window.speechSynthesis.onvoiceschanged = () => {
      voicesReady = true;
      populateVoiceDropdown();
      doSpeak();
    };
  }
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  ttsQueue  = [];
  ttsBusy   = false;
  document.getElementById('stopBtn').style.display = 'none';
}

function drainTTS() {
  if (!ttsQueue.length) {
    ttsBusy = false;
    document.getElementById('stopBtn').style.display = 'none';
    return;
  }
  ttsBusy = true;
  document.getElementById('stopBtn').style.display = 'block';
  const text = ttsQueue.shift();

  // Chrome bug workaround: brief timeout after cancel() prevents stuck synthesis
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    if (ttsVoice) utt.voice = ttsVoice;
    utt.lang  = language === 'he' ? 'he-IL' : 'en-US';
    utt.rate  = 0.92;
    utt.pitch = 1.05;
    utt.onend   = drainTTS;
    utt.onerror = drainTTS;
    window.speechSynthesis.speak(utt);
  }, 50);
}

// Chrome TTS pause bug: synthesis can freeze mid-sentence; resume it every 10s
setInterval(() => {
  if (ttsBusy && window.speechSynthesis.paused) {
    window.speechSynthesis.resume();
  }
}, 10000);

// ════════════════════════════════════════════════════════
//  STT — Web Speech Recognition
// ════════════════════════════════════════════════════════
function toggleMic() {
  if (listening) {
    stopListening();
  } else {
    startListening();
  }
}

function startListening() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    setStatus('Speech recognition is not supported in this browser.');
    return;
  }

  // Stop TTS while user speaks
  window.speechSynthesis.cancel();
  ttsBusy = false; ttsQueue = [];

  recognition = new SpeechRecognition();
  recognition.lang        = language === 'he' ? 'he-IL' : 'en-US';
  recognition.interimResults = true;
  recognition.continuous  = false;

  recognition.onstart = () => {
    listening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = 'Listening…';
  };

  finalTranscript = '';   // reset before new session

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalTranscript += t;
      } else {
        interim += t;
      }
    }
    document.getElementById('micLabel').textContent = finalTranscript + interim || 'Listening…';
  };

  recognition.onend = () => {
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Tap the microphone to speak';

    const text = finalTranscript.trim();
    finalTranscript = '';

    if (text) {
      sendMessage(text);
    } else {
      setStatus('No speech detected. Try again.');
    }
  };

  recognition.onerror = (e) => {
    listening = false;
    document.getElementById('micBtn').classList.remove('listening');
    document.getElementById('micLabel').textContent = 'Tap the microphone to speak';
    setStatus(`Microphone error: ${e.error}`);
  };

  recognition.start();
}

function stopListening() {
  if (recognition) recognition.stop();
}

// ════════════════════════════════════════════════════════
//  Send message to backend
// ════════════════════════════════════════════════════════
async function sendMessage(text) {
  addBubble('user', text);
  setStatus('Thinking…');

  try {
    const res  = await fetch(`/conversations/${conversationId}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();

    if (!res.ok) {
      setStatus(data.detail || 'Error.');
      return;
    }

    addBubble('avatar', data.text);
    speak(data.text);
    setStatus('Tap the microphone to speak.');
  } catch (e) {
    setStatus('Could not reach server.');
  }
}

// ════════════════════════════════════════════════════════
//  Action buttons
// ════════════════════════════════════════════════════════
async function suggestTopics() {
  stopSpeaking();
  await sendMessage('__CHANGE_TOPIC__');
}

async function endConversation() {
  await sendMessage('__END__');
  setStatus('Goodbye! You can close this tab or go back.');
  document.getElementById('micBtn').disabled = true;
  document.querySelectorAll('.action-btns .btn').forEach(b => b.disabled = true);

  setTimeout(() => {
    document.getElementById('micBtn').disabled = false;
    document.querySelectorAll('.action-btns .btn').forEach(b => b.disabled = false);
    goWelcome();
  }, 6000);
}

// ════════════════════════════════════════════════════════
//  Enter key on name field
// ════════════════════════════════════════════════════════
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doIdentify();
});

// Load voices as early as possible and populate the dropdown
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
}
</script>
</body>
</html>
